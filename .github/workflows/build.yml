name: Build/Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          # - os: macos-latest # ARM64
          #   platform: darwin
          #   arch: arm64
          # - os: macos-15-intel # Intel x64 (macos-15-intel 可能不存在)
          #   platform: darwin
          #   arch: x64

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout inklip-base-go
        uses: actions/checkout@v4
        with:
          repository: caleb-meteor/inklip-base-go
          token: ${{ secrets.GH_PAT }}
          path: inklip-base-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Go dependencies
        shell: bash
        run: |
          cd inklip-base-go
          go mod download

      - name: Prepare jieba embeddict (no CGO, dict not in repo)
        shell: bash
        run: |
          cd inklip-base-go
          go run ./tools/copy_jieba_embed.go

      - name: Build inklip-base-go
        shell: bash
        run: |
          cd inklip-base-go
          # glebarez/sqlite 纯 Go 驱动内置 FTS5；-tags embeddict 将结巴词典打入二进制（词典不提交 Git）
          if [ "${{ matrix.platform }}" = "win32" ]; then
            echo "🔨 构建 Windows 版本..."
            mkdir -p dist/win32-x64
            CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -tags embeddict -ldflags "-s -w" -o dist/win32-x64/inklip-base.exe .
          elif [ "${{ matrix.platform }}" = "darwin" ] && [ "${{ matrix.arch }}" = "x64" ]; then
            echo "🔨 构建 Mac Intel 版本..."
            mkdir -p dist/darwin-x64
            CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -tags embeddict -ldflags "-s -w" -o dist/darwin-x64/inklip-base .
          elif [ "${{ matrix.platform }}" = "darwin" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "🔨 构建 Mac ARM 版本..."
            mkdir -p dist/darwin-arm64
            CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -tags embeddict -ldflags "-s -w" -o dist/darwin-arm64/inklip-base .
          fi

      - name: Download and extract platform resources
        shell: bash
        run: |
          mkdir -p resources/${{ matrix.platform }}-${{ matrix.arch }}
          curl -L https://oss-inklip.caleb.center/resources/${{ matrix.platform }}-${{ matrix.arch }}.zip -o resources.zip
          unzip -o resources.zip -d resources/
          rm resources.zip

      - name: Copy inklip-base to resources
        shell: bash
        run: |
          mkdir -p resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base
          if [ "${{ matrix.platform }}" = "win32" ]; then
            if [ ! -f "inklip-base-go/dist/win32-x64/inklip-base.exe" ]; then
              echo "::error::inklip-base.exe not found!"
              exit 1
            fi
            cp inklip-base-go/dist/win32-x64/inklip-base.exe resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/
            echo "✅ inklip-base.exe 已复制到 resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/"
          elif [ "${{ matrix.platform }}" = "darwin" ] && [ "${{ matrix.arch }}" = "x64" ]; then
            if [ ! -f "inklip-base-go/dist/darwin-x64/inklip-base" ]; then
              echo "::error::inklip-base (darwin-x64) not found!"
              exit 1
            fi
            cp inklip-base-go/dist/darwin-x64/inklip-base resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/
            chmod +x resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/inklip-base
            echo "✅ inklip-base (darwin-x64) 已复制到 resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/"
          elif [ "${{ matrix.platform }}" = "darwin" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            if [ ! -f "inklip-base-go/dist/darwin-arm64/inklip-base" ]; then
              echo "::error::inklip-base (darwin-arm64) not found!"
              exit 1
            fi
            cp inklip-base-go/dist/darwin-arm64/inklip-base resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/
            chmod +x resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/inklip-base
            echo "✅ inklip-base (darwin-arm64) 已复制到 resources/${{ matrix.platform }}-${{ matrix.arch }}/inklip-base/"
          fi

      # 结巴词典已通过 -tags embeddict 打入 inklip-base 二进制，无需再复制 jieba-dict 到 resources

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create APPX signing certificate
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate -Type Custom `
            -Subject "CN=36150C96-6074-4814-8057-59B6580F873A" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Inklip Dev Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "inklip-ci-build" -Force -AsPlainText
          $certPath = "${{ github.workspace }}\dev-cert.pfx"
          Export-PfxCertificate -cert $cert -FilePath $certPath -Password $pwd
          echo "APPX_DEV_CERT=$certPath" >> $env:GITHUB_ENV
          echo "APPX_CERT_PASS=inklip-ci-build" >> $env:GITHUB_ENV

      - name: Build Electron App
        shell: bash
        run: |
          export TARGET_ARCH=${{ matrix.arch }}
          pnpm build
          npx electron-forge make --arch ${{ matrix.arch }}
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          APPX_DEV_CERT: ${{ env.APPX_DEV_CERT }}
          APPX_CERT_PASS: ${{ env.APPX_CERT_PASS }}

      - name: List build output (debug)
        shell: bash
        run: |
          echo "=== Build output structure ==="
          find out -type f \( -name "*.zip" -o -name "*.dmg" \) || echo "No artifacts found"
          echo "=== Complete out/ directory ==="
          ls -R out/ || echo "out/ directory is empty"

      - name: Collect Build Artifacts
        shell: bash
        run: |
          mkdir -p collected-artifacts
          
          # 查找所有构建产物
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            # macOS: 查找 DMG 文件 (Electron Forge MakerDMG 输出)
            find out/make -type f -name "*.dmg" -exec cp {} collected-artifacts/ \;
          elif [ "${{ matrix.platform }}" = "win32" ]; then
            # Windows: 查找 ZIP, MSI, EXE 和 APPX 文件
            find out/make -type f \( -name "*.zip" -o -name "*.msi" -o -name "*.exe" -o -name "*.appx" \) -exec cp {} collected-artifacts/ \;
          fi
          
          # 验证是否收集到文件
          if [ ! "$(ls -A collected-artifacts 2>/dev/null)" ]; then
            echo "::error::No build artifacts collected!"
            echo "Expected artifacts in out/make directory"
            ls -R out/
            exit 1
          fi
          
          echo "=== Collected artifacts ==="
          ls -lh collected-artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: collected-artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts (debug)
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts/

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          # 文件名不包含版本号，便于统一更新（每次发布覆盖同平台文件）
          # 例如: Inklip-darwin-arm64.dmg, Inklip-win32-x64.zip
          
          for artifact_dir in artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              platform_arch=$(basename "$artifact_dir" | sed 's/^build-//')
              
              for file in "$artifact_dir"*.zip; do
                if [ -f "$file" ]; then
                  new_filename="Inklip-${platform_arch}.zip"
                  cp "$file" "release-files/$new_filename"
                  echo "Prepared: $new_filename"
                fi
              done
              
              for file in "$artifact_dir"*.dmg; do
                if [ -f "$file" ]; then
                  new_filename="Inklip-${platform_arch}.dmg"
                  cp "$file" "release-files/$new_filename"
                  echo "Prepared: $new_filename"
                fi
              done
              
              for file in "$artifact_dir"*.msi; do
                if [ -f "$file" ]; then
                  new_filename="Inklip-${platform_arch}.msi"
                  cp "$file" "release-files/$new_filename"
                  echo "Prepared: $new_filename"
                fi
              done

              for file in "$artifact_dir"*.exe; do
                if [ -f "$file" ]; then
                  new_filename="Inklip-${platform_arch}.exe"
                  cp "$file" "release-files/$new_filename"
                  echo "Prepared: $new_filename"
                fi
              done

              for file in "$artifact_dir"*.appx; do
                if [ -f "$file" ]; then
                  new_filename="Inklip-${platform_arch}.appx"
                  cp "$file" "release-files/$new_filename"
                  echo "Prepared: $new_filename"
                fi
              done
            fi
          done
          
          # 验证是否有文件准备上传
          if [ -z "$(ls -A release-files 2>/dev/null)" ]; then
            echo "::error::No release files prepared!"
            exit 1
          fi
          
          echo "=== Release files ==="
          ls -lh release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}